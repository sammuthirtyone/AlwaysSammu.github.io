<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><title>KARLRUN - Enhanced Edition</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Courier New',monospace}
canvas{display:block;position:fixed;top:0;left:0}
#UI{position:fixed;inset:0;pointer-events:none;z-index:50}

/* ── Crosshair ── */
#xh{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:22px;height:22px; transition: transform 0.05s}
#xh.shoot{transform:translate(-50%,-50%) scale(1.4);}
#xh::before{content:'';position:absolute;left:10px;top:0;width:2px;height:22px;background:rgba(255,255,255,.9);box-shadow:0 0 4px #fff}
#xh::after{content:'';position:absolute;top:10px;left:0;width:22px;height:2px;background:rgba(255,255,255,.9);box-shadow:0 0 4px #fff}

/* ── Damage vignette ── */
#vig{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 20%,rgba(220,0,0,.85) 100%);opacity:0;transition:opacity .06s;pointer-events:none}

/* ── Hit marker ── */
#hm{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:22px;height:22px;opacity:0;transition:opacity .05s}
#hm::before{content:'';position:absolute;left:10px;top:0;width:2px;height:22px;background:#f00}
#hm::after{content:'';position:absolute;top:10px;left:0;width:22px;height:2px;background:#f00}

/* ── UI Elements (Glossy & Modernized) ── */
#lvlbadge{position:absolute;top:16px;left:50%;transform:translateX(-50%);
  background:linear-gradient(135deg, rgba(255,255,255,0.15), rgba(0,0,0,0.6));
  backdrop-filter: blur(4px); border: 1.5px solid rgba(255,255,255,0.3); border-radius: 8px;
  padding:8px 24px;font-size:12px;font-weight:bold;letter-spacing:6px;color:#fff;white-space:nowrap; box-shadow: 0 4px 10px rgba(0,0,0,0.5);}

#hpzone{position:absolute;bottom:22px;left:22px}
.hudlabel{font-size:10px;font-weight:bold;letter-spacing:4px;color:rgba(255,255,255,.7);text-transform:uppercase;margin-bottom:6px; text-shadow: 0 2px 2px #000;}
#hptrack{width:220px;height:12px;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.2);border-radius:6px;overflow:hidden; box-shadow: inset 0 2px 5px rgba(0,0,0,0.8);}
#hpfill{height:100%;width:100%;background:linear-gradient(180deg,#ff5555,#aa0000);border-radius:4px;transition:width .15s ease-out; box-shadow: inset 0 2px 4px rgba(255,255,255,0.3);}

#scorenum{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);font-size:46px;font-weight:900;color:#fff;letter-spacing:2px;text-shadow:0 4px 0 rgba(0,0,0,.6), 0 0 20px rgba(0,180,255,0.4);}
#ammozone{position:absolute;bottom:22px;right:22px;text-align:right}
#ammoval{font-size:26px;font-weight:900;color:#fff;letter-spacing:2px; text-shadow: 0 3px 0 rgba(0,0,0,.6);}

/* ── Kill feed & Combo ── */
#kf{position:absolute;top:60px;right:22px;display:flex;flex-direction:column;gap:4px;align-items:flex-end}
.kfe{color:#fa0;font-size:12px;font-weight:bold;letter-spacing:2px;animation:kfd 2s forwards; text-shadow: 0 2px 2px #000;}
@keyframes kfd{0%{opacity:1; transform:translateY(0)}80%{opacity:1}100%{opacity:0; transform:translateY(-10px)}}

#combo{position:absolute;top:35%;left:50%;transform:translate(-50%,-50%);font-size:32px;font-weight:900;color:#ffdd00;letter-spacing:4px;text-shadow:0 0 20px #ffdd00, 0 4px 0 #000;opacity:0;pointer-events:none;transition:opacity .1s; transform: scale(1); animation: pulse 0.3s ease-out;}
@keyframes pulse { 0% { transform: translate(-50%,-50%) scale(1.5); } 100% { transform: translate(-50%,-50%) scale(1); } }

/* ── Screen Menus ── */
.overlay{position:absolute;inset:0;background:rgba(5,10,15,.9);display:none;flex-direction:column;align-items:center;justify-content:center;pointer-events:all; backdrop-filter: blur(6px);}
.overlay h1, .overlay h2{font-weight:900;color:#fff;text-shadow:0 0 60px rgba(0,180,255,.6);}
#startscr h1{font-size:100px;letter-spacing:18px;margin-bottom:6px}
#lvlbanner h2{font-size:60px;letter-spacing:12px;margin-bottom:14px}
#deadscr h2{font-size:75px;color:#ff3333;letter-spacing:12px;text-shadow:0 0 40px rgba(255,0,0,.5);margin-bottom:14px}
.sub{font-size:14px;letter-spacing:6px;color:rgba(255,255,255,.6);margin-bottom:50px}
.btn{background:linear-gradient(135deg, rgba(255,255,255,0.1), transparent);border:2px solid #fff;color:#fff;font-family:'Courier New',monospace;font-size:15px;font-weight:bold;letter-spacing:7px;padding:16px 52px;cursor:pointer;text-transform:uppercase;transition:all .2s; border-radius: 4px;}
.btn:hover{background:#fff;color:#000;box-shadow:0 0 40px rgba(255,255,255,.4); transform: translateY(-2px);}

.cg{display:grid;grid-template-columns:1fr 1fr;gap:12px 60px;margin-bottom:50px; background: rgba(0,0,0,0.4); padding: 20px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);}
.cg div{font-size:13px;color:rgba(255,255,255,.7)}
.cg span{display:inline-block;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);padding:3px 10px;border-radius:4px;margin-right:8px;font-size:11px;font-weight:bold;color:#fff;}
</style>
</head>
<body>
<div id="UI">
  <div id="vig"></div><div id="hm"></div><div id="xh"></div>
  <div id="lvlbadge">LEVEL 1</div>
  <div id="hpzone"><div class="hudlabel">HEALTH</div><div id="hptrack"><div id="hpfill"></div></div></div>
  <div id="scorenum">0</div>
  <div id="ammozone"><div class="hudlabel">AMMO</div><div id="ammoval">30/30</div></div>
  <div id="kf"></div><div id="combo"></div>

  <div id="lvlbanner" class="overlay">
    <h2 id="lvlbannertitle">LEVEL COMPLETE</h2>
    <div class="sub" id="lvlbannersub">+50 BONUS</div>
    <button class="btn" id="nextlvlbtn">NEXT LEVEL →</button>
  </div>

  <div id="startscr" class="overlay" style="display:flex;">
    <h1>KARLRUN</h1>
    <div class="sub">parkour · shoot · survive</div>
    <div class="cg">
      <div><span>W A S D</span> Move</div>
      <div><span>MOUSE</span> Look</div>
      <div><span>SPACE</span> Jump / Double</div>
      <div><span>SHIFT</span> Slide / Dash (Air)</div>
      <div><span>E</span> Shoot</div>
      <div><span>R</span> Reload</div>
    </div>
    <button class="btn" id="playbtn">PLAY</button>
  </div>

  <div id="deadscr" class="overlay">
    <h2>YOU DIED</h2>
    <div class="sub" id="dscore">SCORE: 0</div>
    <div class="sub" id="dlvl" style="margin-bottom:36px;font-size:12px;">LEVEL 1</div>
    <button class="btn" id="retrybtn">RETRY</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ════════════════════════════════════════════
//  RENDERER & GRAPHICS
// ════════════════════════════════════════════
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
renderer.outputEncoding = THREE.sRGBEncoding;
document.body.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x0a1622);
scene.fog = new THREE.FogExp2(0x0a1622, 0.015);

const camera = new THREE.PerspectiveCamera(85, innerWidth/innerHeight, 0.05, 200);
scene.add(camera);
const clock = new THREE.Clock();

// ════════════════════════════════════════════
//  AUDIO
// ════════════════════════════════════════════
let AC;
function ac(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
function beep(f,d,t,v,fe){
  try{const c=ac(),o=c.createOscillator(),g=c.createGain();
  o.connect(g);g.connect(c.destination);o.type=t||'square';o.frequency.value=f;
  if(fe)o.frequency.exponentialRampToValueAtTime(fe,c.currentTime+d);
  g.gain.setValueAtTime(v||.3,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);
  o.start();o.stop(c.currentTime+d);}catch(e){}
}
const SFX={
  shoot:()=>{beep(160,.08,'sawtooth',.6);beep(80,.12,'square',.3);},
  jump:()=>beep(220,.15,'sine',.25,450),
  dash:()=>beep(100,.15,'triangle',.4,-50),
  land:()=>beep(60,.1,'sine',.35),
  hit:()=>{beep(90,.15,'square',.65);},
  wall:()=>beep(240,.1,'sine',.25),
  die:()=>[0,100,200].forEach(d=>setTimeout(()=>beep(65,.35,'sawtooth',.5),d)),
  rl:()=>{beep(400,.05,'square',.2);setTimeout(()=>beep(600,.05,'square',.2),80);},
  empty:()=>beep(190,.08,'square',.25),
  lvlUp:()=>{beep(440,.15,'sine',.5);setTimeout(()=>beep(660,.2,'sine',.5),160);setTimeout(()=>beep(880,.3,'sine',.4),340);},
};

// ════════════════════════════════════════════
//  TEXTURES & MATERIALS
// ════════════════════════════════════════════
function mkGrid(bg, line, sz, cells, thick){
  const cv=document.createElement('canvas'); cv.width=cv.height=sz;
  const cx=cv.getContext('2d');
  cx.fillStyle=bg; cx.fillRect(0,0,sz,sz);
  cx.fillStyle=line;
  const s=sz/cells;
  for(let i=0;i<=cells;i++){
    cx.fillRect(i*s - thick/2, 0, thick, sz);
    cx.fillRect(0, i*s - thick/2, sz, thick);
  }
  const t=new THREE.CanvasTexture(cv);
  t.wrapS=t.wrapT=THREE.RepeatWrapping; 
  t.encoding = THREE.sRGBEncoding;
  t.anisotropy = renderer.capabilities.getMaxAnisotropy();
  return t;
}

const TX_WALL  = mkGrid('#0d1822','#3a90b0', 512, 12, 3); 
const TX_FLOOR = mkGrid('#3a4550','#ffffff', 512, 10, 4); 
const TX_PLAT  = mkGrid('#2a3540','#80c0ff', 256, 6, 3);
const TX_CRATE = (()=>{
  const cv=document.createElement('canvas');cv.width=cv.height=128;
  const cx=cv.getContext('2d');
  cx.fillStyle='#a86630';cx.fillRect(0,0,128,128);
  cx.strokeStyle='#7a4010';cx.lineWidth=4;
  cx.strokeRect(4,4,120,120);
  cx.beginPath();cx.moveTo(4,4);cx.lineTo(124,124);cx.stroke();
  cx.beginPath();cx.moveTo(124,4);cx.lineTo(4,124);cx.stroke();
  const t = new THREE.CanvasTexture(cv); t.encoding = THREE.sRGBEncoding; return t;
})();

function LMat(col,map,em,rough=0.7){
  return new THREE.MeshStandardMaterial({color:col||0xffffff, map:map||null, emissive:em||0, roughness: rough, metalness: 0.1});
}

const MAT={
  wall  :LMat(0xffffff, TX_WALL, 0, 0.8),
  floor :LMat(0xffffff, TX_FLOOR, 0, 0.5),
  plat  :LMat(0xffffff, TX_PLAT, 0, 0.6),
  red   :new THREE.MeshStandardMaterial({color:0xff0800, emissive:0x330000, roughness:0.4}),
  redE  :new THREE.MeshBasicMaterial({color:0xff3300}),
  gunW  :LMat(0xb0b8c0, null, 0, 0.3),
  gunG  :LMat(0x505860, null, 0, 0.4),
  gunD  :LMat(0x202530),
  eBody :LMat(0xffcc00, null, 0, 0.5),
  eLimb :LMat(0xddaa00, null, 0, 0.5),
  eHead :LMat(0xffdd22, null, 0, 0.5),
  eEye  :new THREE.MeshBasicMaterial({color:0xff0000}),
  eGun  :LMat(0x222222),
  pBul  :new THREE.MeshBasicMaterial({color:0x0088ff}),
  eBul  :new THREE.MeshBasicMaterial({color:0xff4400}),
  mFlsh :new THREE.MeshBasicMaterial({color:0xffffee, transparent:true, opacity:0.9}),
  crate :LMat(0xffffff, TX_CRATE),
};

// ════════════════════════════════════════════
//  LIGHTING
// ════════════════════════════════════════════
scene.add(new THREE.AmbientLight(0x88aabb, 0.7)); 

const sun=new THREE.DirectionalLight(0xffffff, 1.4);
sun.castShadow=true;
sun.shadow.mapSize.width=sun.shadow.mapSize.height=2048;
sun.shadow.camera.left=sun.shadow.camera.bottom=-80;
sun.shadow.camera.right=sun.shadow.camera.top=80;
sun.shadow.camera.far=250;
sun.shadow.bias = -0.001;
scene.add(sun);scene.add(sun.target);

// ════════════════════════════════════════════
//  PLAYER GUN & EFFECTS
// ════════════════════════════════════════════
const gunGrp=new THREE.Group();

const gBody=new THREE.Mesh(new THREE.BoxGeometry(.12,.15,.55),MAT.gunW);
gBody.position.set(0,0,-.15);gunGrp.add(gBody);
const gSlide=new THREE.Mesh(new THREE.BoxGeometry(.14,.08,.60),MAT.gunG);
gSlide.position.set(0,.11,-.16);gunGrp.add(gSlide);
const gBrl=new THREE.Mesh(new THREE.BoxGeometry(.08,.06,.1),MAT.gunD);
gBrl.position.set(0,.11,-.48);gunGrp.add(gBrl);
const gGrip=new THREE.Mesh(new THREE.BoxGeometry(.11,.28,.15),MAT.gunG);
gGrip.position.set(0,-.18,.05); gGrip.rotation.x = 0.2; gunGrp.add(gGrip);

const mFlash=new THREE.Mesh(new THREE.SphereGeometry(.18,8,8),MAT.mFlsh.clone());
mFlash.position.set(0,.11,-.65); mFlash.scale.set(1,1,2); mFlash.visible=false;
gunGrp.add(mFlash);

// Dynamic Point Light for Muzzle Flash
const muzzleLight = new THREE.PointLight(0x00aaff, 0, 15);
muzzleLight.position.set(0, 0.11, -0.8);
gunGrp.add(muzzleLight);

camera.add(gunGrp);
const GUN_REST=new THREE.Vector3(.35,-.30,-.60);
gunGrp.position.copy(GUN_REST);
gunGrp.rotation.y=-.08;

let gBobT=0,gKick=0,gKickZ=0;

// ════════════════════════════════════════════
//  LEVEL DEFINITIONS & STATE
// ════════════════════════════════════════════
const LEVEL_DEFS=[
  {name:'LEVEL 1', eHP:2, eSpd:1.0, eBSpd:38, eRate:2.5, eCount:1, eWave:4.5, killsNeeded:6,  theme:'platforms'},
  {name:'LEVEL 2', eHP:2, eSpd:1.2, eBSpd:45, eRate:2.0, eCount:2, eWave:4.0, killsNeeded:10, theme:'wallrun'},
  {name:'LEVEL 3', eHP:3, eSpd:1.4, eBSpd:52, eRate:1.7, eCount:2, eWave:3.5, killsNeeded:14, theme:'gaps'},
  {name:'LEVEL 4', eHP:3, eSpd:1.6, eBSpd:60, eRate:1.4, eCount:3, eWave:3.0, killsNeeded:18, theme:'mixed'},
  {name:'LEVEL 5', eHP:4, eSpd:1.8, eBSpd:65, eRate:1.1, eCount:4, eWave:2.5, killsNeeded:22, theme:'mixed'},
  {name:'LEVEL 6', eHP:5, eSpd:2.2, eBSpd:70, eRate:0.9, eCount:5, eWave:2.0, killsNeeded:30, theme:'mixed'},
];

const surfaces=[], enemies=[], bullets=[], sparks=[], worldMeshes=[];
let builtUpToZ=-9999;
const CW=13, CH=8, CL=55;

let eTimer=0;
const pPos=new THREE.Vector3(0,2.5,0), pVel=new THREE.Vector3();
let yaw=Math.PI, pitch=0; 
const EYE=1.65, PRAD=0.32, GRAV=-28, SPFWD=10;
let onGround=false, wallRun=false, wallSide=0, wallT=0;
let jumps=0, sliding=false, slideT=0, dashCd=0, pShake=0, pHP=100;
let ammo=30, maxAmmo=30, reloading=false, reloadT=0, shootCd=0;
let score=0, combo=0, comboT=0, alive=false, isDead=false;
let lvlIdx=0, levelKills=0, levelComplete=false;
let cfg=LEVEL_DEFS[0];

const K={}; let dragging=false;

// ════════════════════════════════════════════
//  WORLD GENERATION
// ════════════════════════════════════════════
function mkBox(x,y,z,w,h,d,mat,noShadow){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
  m.position.set(x,y,z);
  if(!noShadow){m.castShadow=true;m.receiveShadow=true;}
  scene.add(m);worldMeshes.push(m); return m;
}
function addSurf(x,y,z,w,h,d,mat,isWall,nx){
  const mesh=mkBox(x,y,z,w,h,d,mat);
  const s={mesh,minX:x-w/2,maxX:x+w/2,minY:y-h/2,maxY:y+h/2,minZ:z-d/2,maxZ:z+d/2,isWall:!!isWall,nx:nx||0};
  surfaces.push(s); return s;
}

function buildChunk(startZ, theme){
  const mz = startZ + CL/2, endZ = startZ + CL;
  addSurf(-CW/2, CH/2, mz, 0.5, CH*2.5, CL, MAT.wall, true, 1);
  addSurf( CW/2, CH/2, mz, 0.5, CH*2.5, CL, MAT.wall, true, -1);
  mkBox(-CW/2 + 1.2, -0.4, mz, 2.4, 0.5, CL, MAT.red, true);
  mkBox( CW/2 - 1.2, -0.4, mz, 2.4, 0.5, CL, MAT.red, true);
  mkBox(0, CH*1.5, mz, CW, 0.5, CL, MAT.wall, true);

  function plat(x,y,z,w,d){
    addSurf(x,y,z,w,0.5,d,MAT.floor,false,0);
    if(Math.random()>0.6) mkBox(x+(Math.random()-.5)*w*.5, y+0.85, z, 0.8,0.8,0.8, MAT.crate, false);
  }
  function wallR(x,y,z,d){
    addSurf(x,y,z,0.4,CH,d,MAT.wall,true,x<0?1:-1);
    mkBox(x, 0.2, z, 0.45, 0.35, d, MAT.redE, true);
  }

  if(theme==='platforms' || theme==='corridor'){
    plat(0, -0.7, sz+10, 6, 12); plat(-2.5, 0.5, sz+26, 4, 8);
    plat( 2.5, 1.5, sz+40, 4, 8); plat( 0, 0.0, sz+50, 6, 10);
  } else if(theme==='wallrun'){
    plat(0, -0.7, sz+8, 6, 8); wallR(-3.8, CH/2, sz+24, 20); 
    wallR( 3.8, CH/2, sz+40, 20); plat(0, -0.7, sz+52, 6, 10);
  } else if(theme==='gaps'){
    plat(0, -0.7, sz+5, 5, 5); plat(-2.5, 0.5, sz+16, 3, 3);
    plat( 2.5, 1.2, sz+27, 3, 3); plat(-1.5, 2.0, sz+38, 3, 3); plat(0, 0.0, sz+50, 6, 8);
  } else if(theme==='mixed'){
    plat(-2, 0.0, sz+10, 4, 6); wallR( 3.8, CH/2, sz+22, 16);
    plat( 0, 1.5, sz+36, 3, 3); wallR(-3.8, CH/2, sz+48, 14); plat( 0, 0.0, sz+55, 6, 8);
  }

  if (startZ === 0) addSurf(0, -0.7, startZ + 5, CW-4, 1.4, 15, MAT.floor);
  builtUpToZ = endZ;
}

function getSafeSpawnPoint(zMin, zMax) {
  const floors = surfaces.filter(s => !s.isWall && s.minZ >= zMin && s.maxZ <= zMax);
  if (floors.length === 0) return new THREE.Vector3(0, 2, (zMin+zMax)/2);
  const f = floors[Math.floor(Math.random()*floors.length)];
  return new THREE.Vector3( (f.minX+f.maxX)/2, f.maxY, (f.minZ+f.maxZ)/2 );
}

// ════════════════════════════════════════════
//  ENEMIES
// ════════════════════════════════════════════
function buildEnemyMesh(){
  const g=new THREE.Group();
  function pt(w,h,d,mat,x,y,z){const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat.clone()); m.position.set(x,y,z);m.castShadow=true;g.add(m);return m;}
  
  const torso=pt(.45,.6,.28,MAT.eBody, 0,.93,0), head=pt(.4,.4,.4,MAT.eHead, 0,1.5,0);
  pt(.1,.08,.05,MAT.eEye,-.1,1.52,.21); pt(.1,.08,.05,MAT.eEye,.1,1.52,.21);
  
  const aLG=new THREE.Group();aLG.position.set(-.35,.85,0);g.add(aLG);
  const aL=new THREE.Mesh(new THREE.BoxGeometry(.16,.55,.16),MAT.eLimb.clone()); aL.position.y=-.2;aLG.add(aL);
  
  const aRG=new THREE.Group();aRG.position.set(.35,.85,0);g.add(aRG);
  const aR=new THREE.Mesh(new THREE.BoxGeometry(.16,.55,.16),MAT.eLimb.clone()); aR.position.y=-.2;aRG.add(aR);
  
  const gunMain=new THREE.Mesh(new THREE.BoxGeometry(.12,.15,.5),MAT.eGun.clone()); gunMain.position.set(0,-.25,-.25);aRG.add(gunMain);
  const gunBarrel=new THREE.Mesh(new THREE.BoxGeometry(.06,.06,.4),MAT.eGun.clone()); gunBarrel.position.set(0,-.2,-.6);aRG.add(gunBarrel);
  const eMFlash=new THREE.Mesh(new THREE.SphereGeometry(.12,6,6), MAT.mFlsh.clone()); eMFlash.position.set(0,-.2,-.85);eMFlash.scale.set(1,1,1.5);eMFlash.visible=false;aRG.add(eMFlash);
  
  const lLG=new THREE.Group();lLG.position.set(-.15,.5,0);g.add(lLG);
  const lL=new THREE.Mesh(new THREE.BoxGeometry(.18,.58,.18),MAT.eLimb.clone()); lL.position.y=-.25;lLG.add(lL);
  const lRG=new THREE.Group();lRG.position.set(.15,.5,0);g.add(lRG);
  const lR=new THREE.Mesh(new THREE.BoxGeometry(.18,.58,.18),MAT.eLimb.clone()); lR.position.y=-.25;lRG.add(lR);

  g.userData={torso,head,aLG,aRG,lLG,lRG,eMFlash}; return g;
}

function spawnEnemy(zMin, zMax){
  const spawnPos = getSafeSpawnPoint(zMin, zMax);
  const grp=buildEnemyMesh(); grp.position.copy(spawnPos); scene.add(grp);worldMeshes.push(grp);
  enemies.push({grp, pos:grp.position, vel:new THREE.Vector3(), hp:cfg.eHP, maxHp:cfg.eHP, alive:true, shootT:.5+Math.random()*cfg.eRate, animT:Math.random()*6.28, hitFlash:0, deathT:0, sd:Math.random()>.5?1:-1, strafT:1+Math.random(), state:'patrol', alertTimer:0});
}

// ════════════════════════════════════════════
//  INPUTS & ACTIONS
// ════════════════════════════════════════════
renderer.domElement.addEventListener('mousedown',()=>{if(!alive||isDead)return;dragging=true;renderer.domElement.requestPointerLock();});
renderer.domElement.addEventListener('mouseup',()=>dragging=false);
renderer.domElement.addEventListener('mouseleave',()=>dragging=false);

renderer.domElement.addEventListener('mousemove',e=>{
  if(!alive||isDead||!dragging||document.pointerLockElement===renderer.domElement)return;
  yaw-=e.movementX*.003;pitch-=e.movementY*.003;pitch=Math.max(-.5,Math.min(.5,pitch));
});
document.addEventListener('mousemove',e=>{
  if(!alive||isDead||document.pointerLockElement!==renderer.domElement)return;
  yaw-=e.movementX*.0022;pitch-=e.movementY*.0022;pitch=Math.max(-.5,Math.min(.5,pitch));
});
document.addEventListener('keydown',e=>{
  K[e.code]=true; if(!alive||isDead)return;
  if(e.code==='Space'){e.preventDefault();doJump();}
  if(e.code==='KeyR'&&!reloading&&ammo<maxAmmo)doReload();
  if(e.code==='KeyE'&&shootCd<=0)doShoot();
});
document.addEventListener('keyup',e=>K[e.code]=false);

function doJump(){
  if(onGround){pVel.y=12.5;onGround=false;jumps=1;SFX.jump();}
  else if(wallRun){pVel.y=11.5;pVel.x=wallSide*8.5;wallRun=false;jumps=1;SFX.jump();}
  else if(jumps<2){pVel.y=11;jumps++;SFX.jump();}
}

function doDash(){
  if(dashCd>0 || onGround) return;
  const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
  pVel.add(dir.multiplyScalar(22)); pVel.y = Math.max(pVel.y, 4); 
  dashCd = 1.0; sliding = false; SFX.dash();
  camera.fov = 95; camera.updateProjectionMatrix(); // FOV kick
}

function doReload(){
  reloading=true;reloadT=1.4;
  document.getElementById('ammoval').style.color = '#888';
  setTimeout(()=>{ammo=maxAmmo;updateAmmoUI();SFX.rl();document.getElementById('ammoval').style.color='#fff';reloading=false;}, 1400);
}

function fireLaser(from, dir, speed, isPlayer) {
  const bm = new THREE.Mesh(new THREE.BoxGeometry(isPlayer?.06:.1, isPlayer?.06:.1, 2.0), isPlayer ? MAT.pBul : MAT.eBul);
  bm.position.copy(from); bm.lookAt(from.clone().add(dir)); scene.add(bm);
  bullets.push({mesh:bm, dir:dir.clone(), speed, life:1.5, player:isPlayer, pos:from.clone()});
}

function doShoot(){
  if(reloading||shootCd>0)return;
  if(ammo<=0){SFX.empty();doReload();return;}
  ammo--;updateAmmoUI();SFX.shoot();
  pShake=.05;gKick=.28;gKickZ=.18;shootCd=.12;
  
  // Crosshair punch
  const xh = document.getElementById('xh'); xh.classList.add('shoot');
  setTimeout(()=>xh.classList.remove('shoot'), 50);

  // Dynamic Light Muzzle Flash
  mFlash.visible=true; muzzleLight.intensity = 15;
  setTimeout(()=>{mFlash.visible=false; muzzleLight.intensity = 0;}, 50);

  const dir=new THREE.Vector3();camera.getWorldDirection(dir);
  const org=camera.position.clone().addScaledVector(dir,.6); org.y -= 0.1; 
  fireLaser(org, dir, 220, true);
}

function fireEnemyBullet(e, from, target){
  const dir=target.clone().sub(from).normalize();
  const inac=Math.max(.02,.20-lvlIdx*.03);
  dir.x+=(Math.random()-.5)*inac;dir.y+=(Math.random()-.5)*inac*.8;dir.normalize();
  if(e.grp.userData.eMFlash){e.grp.userData.eMFlash.visible=true; setTimeout(()=>e.grp.userData.eMFlash.visible=false, 55);}
  fireLaser(from, dir, cfg.eBSpd, false);
}

// ════════════════════════════════════════════
//  SYSTEMS
// ════════════════════════════════════════════
function mkSparks(p,col,n){
  for(let i=0;i<(n||10);i++){
    const m=new THREE.Mesh(new THREE.BoxGeometry(.1,.1,.1),new THREE.MeshBasicMaterial({color:col||0xffee44})); m.position.copy(p);scene.add(m);
    sparks.push({mesh:m,vel:new THREE.Vector3((Math.random()-.5)*18,Math.random()*12+3,(Math.random()-.5)*18),life:.4+Math.random()*.5});
  }
}

function resolvePlayer(){
  let grounded=false,wallHit=null; const r=PRAD,topY=pPos.y+EYE+.15;
  for(const s of surfaces){
    if(pPos.z>s.maxZ+2||pPos.z<s.minZ-2 || pPos.x>s.maxX+r+.5||pPos.x<s.minX-r-.5)continue;
    const inX=pPos.x>s.minX-r&&pPos.x<s.maxX+r, inZ=pPos.z>s.minZ-r&&pPos.z<s.maxZ+r, inY=pPos.y<s.maxY+EYE+.3&&topY>s.minY-.3;
    if(!inX||!inZ||!inY)continue;
    if(!s.isWall){
      if(pVel.y<=.5&&pPos.y<=s.maxY+.55&&pPos.y>=s.maxY-.8){pPos.y=s.maxY;pVel.y=0;grounded=true;}
      if(pVel.y>0&&topY>=s.minY&&topY<=s.minY+.6){pVel.y=0;pPos.y=s.minY-EYE-.18;}
    }else{
      wallHit=s; const dL=pPos.x-(s.minX-r),dR=(s.maxX+r)-pPos.x;
      if(dL<dR){if(dL<.45){pPos.x=s.minX-r;if(pVel.x<0)pVel.x=0;}}else{if(dR<.45){pPos.x=s.maxX+r;if(pVel.x>0)pVel.x=0;}}
    }
  }
  if(pPos.y < -12){ takeDmg(100); } 
  return{grounded,wallHit};
}

function takeDmg(d){
  if(isDead)return; pHP=Math.max(0,pHP-d);
  document.getElementById('hpfill').style.width=pHP+'%';
  const v=document.getElementById('vig');v.style.opacity=1;setTimeout(()=>v.style.opacity=0,160);
  pShake=.15;SFX.hit(); if(pHP<=0)doDie();
}

function showHitMarker(){const h=document.getElementById('hm');h.style.opacity=1;setTimeout(()=>h.style.opacity=0,120);}
function doDie(){isDead=true;document.exitPointerLock();document.getElementById('dscore').textContent='SCORE: '+score;document.getElementById('dlvl').textContent=cfg.name;document.getElementById('deadscr').style.display='flex';SFX.die();}

function killEnemy(e){
  e.alive=false;e.deathT=.7; combo++;comboT=2.5;
  const pts=10*(lvlIdx+1)*Math.max(combo,1); score+=pts;levelKills++;
  document.getElementById('scorenum').textContent=score;
  if(combo>1){
    const c=document.getElementById('combo');c.textContent='×'+combo+' COMBO';c.style.opacity=1;
    c.style.animation = 'none'; void c.offsetWidth; c.style.animation = 'pulse 0.3s ease-out';
  }
  const d=document.createElement('div');d.className='kfe';d.textContent='+'+pts; document.getElementById('kf').appendChild(d);setTimeout(()=>d.remove(),2100);
  mkSparks(e.pos.clone().add(new THREE.Vector3(0,1,0)),0xffdd22, 25); SFX.die();showHitMarker();
  if(levelKills>=cfg.killsNeeded&&!levelComplete)triggerLevelComplete();
}

function updateAmmoUI(){document.getElementById('ammoval').textContent=reloading?'--/30':ammo+'/'+maxAmmo;}

function triggerLevelComplete(){
  levelComplete=true; SFX.lvlUp(); const bonus=200*(lvlIdx+1); score+=bonus; document.getElementById('scorenum').textContent=score;
  const ban=document.getElementById('lvlbanner'); document.getElementById('lvlbannertitle').textContent=cfg.name+' COMPLETE!'; document.getElementById('lvlbannersub').textContent='BONUS +'+bonus+' POINTS';
  ban.style.display='flex'; document.exitPointerLock();
}

document.getElementById('nextlvlbtn').addEventListener('click',()=>{
  document.getElementById('lvlbanner').style.display='none'; lvlIdx=Math.min(lvlIdx+1,LEVEL_DEFS.length-1); cfg=LEVEL_DEFS[lvlIdx];
  spawnNextLevel(); renderer.domElement.requestPointerLock();
});

function clearWorld(){
  worldMeshes.forEach(m=>scene.remove(m));worldMeshes.length=0;surfaces.length=0;
  enemies.forEach(e=>scene.remove(e.grp));enemies.length=0;
  bullets.forEach(b=>scene.remove(b.mesh));bullets.length=0;
  sparks.forEach(s=>scene.remove(s.mesh));sparks.length=0; builtUpToZ=0;
}

function spawnNextLevel(){
  clearWorld(); levelKills=0;levelComplete=false;eTimer=0; pHP=Math.min(pHP+40,100); document.getElementById('hpfill').style.width=pHP+'%'; document.getElementById('lvlbadge').textContent=cfg.name;
  pPos.set(0,2.5,0);pVel.set(0,0,0); yaw=Math.PI; pitch=0;
  for(let i=0;i<6;i++) buildChunk(i*CL, cfg.theme);
}

function initGame(){
  clearWorld(); pPos.set(0,2.5,0);pVel.set(0,0,0); yaw=Math.PI; pitch=0; onGround=false;wallRun=false;jumps=0; sliding=false;pShake=0;pHP=100;
  ammo=30;reloading=false;shootCd=0; score=0;combo=0;comboT=0;eTimer=0;dashCd=0;
  lvlIdx=0;cfg=LEVEL_DEFS[0];levelKills=0;levelComplete=false;isDead=false;
  document.getElementById('hpfill').style.width='100%'; document.getElementById('scorenum').textContent='0'; document.getElementById('lvlbadge').textContent='LEVEL 1'; document.getElementById('combo').style.opacity=0;
  updateAmmoUI(); for(let i=0;i<6;i++) buildChunk(i*CL, cfg.theme);
}

document.getElementById('playbtn').addEventListener('click',()=>{document.getElementById('startscr').style.display='none';initGame();alive=true;renderer.domElement.requestPointerLock();});
document.getElementById('retrybtn').addEventListener('click',()=>{document.getElementById('deadscr').style.display='none';initGame();alive=true;isDead=false;renderer.domElement.requestPointerLock();});

// ════════════════════════════════════════════
//  MAIN UPDATE LOOP
// ════════════════════════════════════════════
const FWD=new THREE.Vector3(),RGT=new THREE.Vector3();

function update(dt){
  if(!alive||isDead||levelComplete)return;

  while(builtUpToZ < pPos.z + 200){ buildChunk(builtUpToZ, cfg.theme); }
  for(let i=surfaces.length-1;i>=0;i--){ if(surfaces[i].maxZ < pPos.z - 80){ scene.remove(surfaces[i].mesh); const wi=worldMeshes.indexOf(surfaces[i].mesh);if(wi!==-1)worldMeshes.splice(wi,1); surfaces.splice(i,1); } }

  sun.position.set(pPos.x+15,30,pPos.z-25); sun.target.position.copy(pPos);sun.target.updateMatrixWorld();

  FWD.set(-Math.sin(yaw),0,-Math.cos(yaw)); RGT.set( Math.cos(yaw),0,-Math.sin(yaw));
  let mx=0,mz=0;
  if(K['KeyW']||K['ArrowUp']){mx+=FWD.x;mz+=FWD.z;} if(K['KeyS']||K['ArrowDown']){mx-=FWD.x;mz-=FWD.z;}
  if(K['KeyA']||K['ArrowLeft']){mx-=RGT.x;mz-=RGT.z;} if(K['KeyD']||K['ArrowRight']){mx+=RGT.x;mz+=RGT.z;}
  const ml=Math.hypot(mx,mz);if(ml>0){mx/=ml;mz/=ml;}

  // Dash & Slide Logic
  if(dashCd > 0) dashCd -= dt;
  if((K['ShiftLeft']||K['ShiftRight'])){
    if(onGround && !sliding && Math.hypot(pVel.x,pVel.z)>3){ sliding=true; slideT=.6; }
    else if(!onGround && dashCd<=0){ doDash(); }
  }
  
  if(camera.fov > 85) { camera.fov = Math.max(85, camera.fov - dt*40); camera.updateProjectionMatrix(); } // FOV recovery

  if(sliding){slideT-=dt;pVel.x*=.96;pVel.z*=.96;if(slideT<=0)sliding=false;}
  else{const sp=wallRun?SPFWD*1.3:SPFWD;pVel.x+=(mx*sp-pVel.x)*Math.min(dt*12,1);pVel.z+=(mz*sp-pVel.z)*Math.min(dt*12,1);}

  if(wallRun){wallT-=dt;pVel.y=Math.max(pVel.y-4*dt,-1.5);if(wallT<=0||onGround)wallRun=false;} else pVel.y+=GRAV*dt;

  const prevG=onGround; pPos.addScaledVector(pVel,dt); const{grounded,wallHit}=resolvePlayer(); onGround=grounded;
  if(onGround&&!prevG){jumps=0;wallRun=false;if(pVel.y<-7)SFX.land();}
  if(!onGround&&!wallRun&&wallHit&&Math.hypot(pVel.x,pVel.z)>3.5){wallRun=true;wallT=1.5;wallSide=wallHit.nx>0?1:-1;pVel.y=Math.max(pVel.y,3.0);jumps=1;SFX.wall();}

  let shk=0;if(pShake>0){shk=pShake;pShake*=.7;if(pShake<.001)pShake=0;}
  
  // Head Bob
  const mv=Math.min(Math.hypot(pVel.x,pVel.z)/SPFWD,1);
  const headBob = onGround && !sliding ? Math.sin(clock.elapsedTime * 12) * 0.08 * mv : 0;
  
  camera.position.set(pPos.x+(Math.random()-.5)*shk,pPos.y+EYE+headBob+(sliding?-.6:0)+(Math.random()-.5)*shk,pPos.z);
  camera.rotation.order='YXZ';camera.rotation.y=yaw;camera.rotation.x=pitch+(wallRun?-.05:0);camera.rotation.z=wallRun?wallSide*.15:(mx*0.02);

  gBobT+=dt*7; const bob=onGround?Math.sin(gBobT)*.015*mv:0;
  if(gKick>0)gKick=Math.max(0,gKick-dt*6); if(gKickZ>0)gKickZ=Math.max(0,gKickZ-dt*5);
  gunGrp.position.set(GUN_REST.x, GUN_REST.y+bob, GUN_REST.z + gKickZ*.4);
  gunGrp.rotation.x=.08 + gKick*.35;gunGrp.rotation.z=wallRun?-.12:0;

  if(shootCd>0)shootCd-=dt;
  if(K['KeyE']&&shootCd<=0&&!reloading)doShoot();

  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i]; b.pos.addScaledVector(b.dir,b.speed*dt);b.mesh.position.copy(b.pos);b.life-=dt;
    if(b.life<=0){scene.remove(b.mesh);bullets.splice(i,1);continue;}
    if(b.player){
      let hit=false;
      for(const e of enemies){
        if(!e.alive)continue; const ep=e.pos.clone();ep.y+=1;
        if(b.pos.distanceTo(ep)<1.2){
          e.hp--;e.hitFlash=.15;mkSparks(b.pos.clone(),0xffeedd,12);
          scene.remove(b.mesh);bullets.splice(i,1);hit=true;
          if(e.hp<=0)killEnemy(e);else showHitMarker(); break;
        }
      }
    }else{
      const pp=pPos.clone();pp.y+=.9;
      if(b.pos.distanceTo(pp)<1.0){takeDmg(10+lvlIdx*2);mkSparks(b.pos.clone(),0xff3300,10);scene.remove(b.mesh);bullets.splice(i,1);}
    }
  }

  if(!levelComplete){ eTimer-=dt; if(eTimer<=0){ for(let i=0;i<cfg.eCount;i++) spawnEnemy(pPos.z+15, pPos.z+45); eTimer=cfg.eWave; } }

  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    if(!e.alive){ e.deathT-=dt;e.grp.position.y-=5*dt;e.grp.rotation.z+=5*dt; if(e.deathT<=0){scene.remove(e.grp);enemies.splice(i,1);} continue; }
    if(e.pos.z < pPos.z-45){scene.remove(e.grp);enemies.splice(i,1);continue;}

    const toP=pPos.clone().sub(e.pos), dist=toP.length(); e.animT+=dt*4.5; 
    e.grp.rotation.y += (Math.atan2(toP.x, toP.z) - e.grp.rotation.y) * dt * 6;

    if(dist<35){e.state='alert';e.alertTimer=2;} else if(e.alertTimer>0){e.alertTimer-=dt;} else e.state='patrol';

    e.strafT-=dt;if(e.strafT<=0){e.sd*=-1;e.strafT=1+Math.random()*2;}
    if(dist>7&&e.state==='alert'){e.vel.x+=(toP.x/dist)*3.5*dt*cfg.eSpd;e.vel.z+=(toP.z/dist)*3.5*dt*cfg.eSpd;}
    else{e.vel.x+=Math.cos(e.animT*.5)*e.sd*cfg.eSpd*dt;}
    
    e.vel.x*=.82;e.vel.z*=.82;e.vel.y+=GRAV*dt; e.pos.addScaledVector(e.vel,dt);
    
    for(const s of surfaces) {
      if(!s.isWall && e.pos.x>s.minX && e.pos.x<s.maxX && e.pos.z>s.minZ && e.pos.z<s.maxZ) {
        if(e.vel.y<=0 && e.pos.y<=s.maxY+.5 && e.pos.y>=s.maxY-1) { e.pos.y = s.maxY; e.vel.y = 0; break; }
      }
    }
    if(e.pos.y < -5) { killEnemy(e); continue; }

    e.shootT-=dt;
    if(e.shootT<=0&&dist<30&&e.state==='alert'){
      const from=e.pos.clone();from.y+=1.2; fireEnemyBullet(e, from, pPos.clone().add(new THREE.Vector3(0,1.0,0))); e.shootT=cfg.eRate*(.5+Math.random()*.5);
    }

    const ud=e.grp.userData, isMoving = Math.hypot(e.vel.x, e.vel.z) > 0.5, animMult = isMoving ? 1 : 0;
    if(ud.lLG){ud.lLG.rotation.x=Math.sin(e.animT)*.7 * animMult;ud.lRG.rotation.x=-Math.sin(e.animT)*.7 * animMult;}
    if(ud.aLG) ud.aLG.rotation.x = -Math.sin(e.animT)*.5 * animMult;
    
    if(e.state==='alert'){ if(ud.aRG) { ud.aRG.rotation.x = -1.2 + Math.atan2(toP.y, dist); } } 
    else { if(ud.aRG) ud.aRG.rotation.x = Math.sin(e.animT)*.5 * animMult; }
    
    if(ud.torso)ud.torso.position.y=.93+Math.sin(e.animT*2)*.025*animMult;
    if(e.hitFlash>0){ e.hitFlash-=dt; const col=e.hitFlash>0?0xffffff:0x000000; [ud.torso,ud.head].forEach(m=>{if(m&&m.material&&m.material.emissive)m.material.emissive.setHex(col);}); }
  }

  for(let i=sparks.length-1;i>=0;i--){
    const s=sparks[i];s.vel.y+=GRAV*dt;s.mesh.position.addScaledVector(s.vel,dt);s.life-=dt;
    if(s.mesh.material)s.mesh.material.opacity=Math.max(0,s.life/.5);
    if(s.life<=0){scene.remove(s.mesh);sparks.splice(i,1);}
  }
  if(comboT>0){comboT-=dt;if(comboT<=0){combo=0;document.getElementById('combo').style.opacity=0;}}
}

function frame(){ requestAnimationFrame(frame); const dt=Math.min(clock.getDelta(),.05); update(dt); renderer.render(scene,camera); }
frame();

window.addEventListener('resize',()=>{ renderer.setSize(innerWidth,innerHeight); camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); });
</script>
</body>
</html>
