<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>💍 A Special Question...</title>
    <style>
        :root {
            --bg-pink: #ffe0ec;
            --pink-light: #fff0f5;
            --pink-mid: #f8c8d8;
            --pink-dark: #e891b4;
            --pink-accent: #ff6b9d;
            --rose: #e8a0b4;
            --velvet: #c4546a;
            --velvet-dark: #9e3d52;
            --velvet-light: #d4788c;
            --gold: #f0d78c;
            --gold-dark: #c49a3c;
            --gold-light: #fdf0c8;
            --diamond: #e8f4fd;
            --diamond-sparkle: #ffffff;
            --white: #fff;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.13);
            --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.18);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            min-height: -webkit-fill-available;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg,
                    #fce4ec 0%, #fdf0f5 15%, #ffe8f0 30%, #fdf2f7 45%,
                    #ffe4ed 55%, #fde8f2 70%, #fef0f6 85%, #fce8f0 100%);
            background-size: 400% 400%;
            animation: bgShift 16s ease-in-out infinite;
            font-family: 'Segoe UI', 'SF Pro Display', 'Helvetica Neue', sans-serif;
            overflow-x: hidden;
            cursor: default;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            position: relative;
            padding: 15px;
            touch-action: manipulation;
        }

        @keyframes bgShift {
            0%,
            100% {
                background-position: 0% 50%;
            }
            25% {
                background-position: 100% 30%;
            }
            50% {
                background-position: 60% 100%;
            }
            75% {
                background-position: 30% 70%;
            }
        }

        /* Floating hearts & sparkles */
        .bg-decorations {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .floating-element {
            position: absolute;
            bottom: -50px;
            animation: floatUp linear infinite;
            opacity: 0.5;
        }
        @keyframes floatUp {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg) scale(0.4);
                opacity: 0;
            }
            8% {
                opacity: 0.55;
            }
            30% {
                transform: translateY(-35vh) translateX(20px) rotate(14deg) scale(0.85);
                opacity: 0.4;
            }
            60% {
                transform: translateY(-65vh) translateX(-18px) rotate(-10deg) scale(0.65);
                opacity: 0.2;
            }
            90% {
                opacity: 0.03;
            }
            100% {
                transform: translateY(-108vh) translateX(8px) rotate(5deg) scale(0.25);
                opacity: 0;
            }
        }

        /* Main container */
        .main-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
        }

        /* Title */
        .title-text {
            font-size: 1.2rem;
            font-weight: 700;
            color: #7a3b52;
            text-align: center;
            background: rgba(255, 255, 255, 0.65);
            padding: 10px 24px;
            border-radius: 50px;
            letter-spacing: 0.4px;
            box-shadow: 0 4px 16px rgba(180, 110, 140, 0.18);
            animation: titlePulse 3s ease-in-out infinite;
            max-width: 90vw;
            line-height: 1.4;
        }
        @keyframes titlePulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.04);
            }
        }
        .title-text.opened {
            animation: none;
            background: rgba(255, 245, 248, 0.85);
            color: #c4546a;
        }

        /* Box area */
        .box-area {
            position: relative;
            width: 240px;
            height: 200px;
            perspective: 1000px;
            cursor: pointer;
            touch-action: manipulation;
            margin: 0 auto;
        }
        @media (max-width: 380px) {
            .box-area {
                width: 200px;
                height: 170px;
            }
            .title-text {
                font-size: 1rem;
                padding: 8px 18px;
            }
        }
        @media (min-width: 500px) {
            .box-area {
                width: 270px;
                height: 225px;
            }
        }

        /* Box bottom */
        .box-bottom {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 75%;
            height: 55%;
            background: linear-gradient(180deg,
                    #d4788c 0%, #c4546a 15%, #b84a5e 35%, #a34052 100%);
            border-radius: 10px 10px 16px 16px;
            box-shadow:
                0 10px 30px rgba(0, 0, 0, 0.25),
                inset 0 2px 4px rgba(255, 255, 255, 0.1),
                inset 0 -3px 6px rgba(0, 0, 0, 0.2);
            z-index: 2;
            border: 2px solid rgba(255, 255, 255, 0.08);
            overflow: visible;
        }
        /* Velvet texture lines */
        .box-bottom::before {
            content: '';
            position: absolute;
            top: 15%;
            left: 8%;
            right: 8%;
            bottom: 15%;
            background: repeating-linear-gradient(0deg,
                    transparent,
                    transparent 2px,
                    rgba(255, 255, 255, 0.03) 2px,
                    rgba(255, 255, 255, 0.03) 3px);
            border-radius: 4px;
            pointer-events: none;
        }
        /* Gold trim on box bottom */
        .box-bottom::after {
            content: '';
            position: absolute;
            top: 0;
            left: 5%;
            right: 5%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #f0d78c 20%, #fdf0c8 50%, #f0d78c 80%, transparent);
            border-radius: 2px;
            pointer-events: none;
        }

        /* Box lid – now properly covers the cushion and ring */
        .box-lid {
            position: absolute;
            bottom: 32%;
            left: 50%;
            transform: translateX(-50%);
            width: 78%;
            height: 60%;
            background: linear-gradient(180deg,
                    #e8a0b4 0%, #d4788c 20%, #c4546a 60%, #b84a5e 100%);
            border-radius: 16px 16px 8px 8px;
            box-shadow:
                0 8px 28px rgba(0, 0, 0, 0.3),
                inset 0 3px 6px rgba(255, 255, 255, 0.12),
                inset 0 -2px 4px rgba(0, 0, 0, 0.15);
            z-index: 5;
            transform-origin: bottom center;
            transition: transform 0.65s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 2px solid rgba(255, 255, 255, 0.06);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .box-lid.open {
            transform: translateX(-50%) rotateX(-140deg);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        /* Lid gold trim */
        .box-lid::before {
            content: '';
            position: absolute;
            bottom: 3px;
            left: 6%;
            right: 6%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #f0d78c 18%, #fdf0c8 50%, #f0d78c 82%, transparent);
            border-radius: 2px;
            pointer-events: none;
            z-index: 1;
        }
        /* Lid top decoration */
        .box-lid::after {
            content: '💝';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.2rem;
            pointer-events: none;
            z-index: 2;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
            transition: opacity 0.4s ease;
        }
        .box-lid.open::after {
            opacity: 0;
        }
        @media (max-width: 380px) {
            .box-lid::after {
                font-size: 1.7rem;
            }
        }

        /* Inner cushion */
        .box-cushion {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            width: 65%;
            height: 38%;
            background: linear-gradient(180deg,
                    #fef5f0 0%, #fdf0e8 30%, #f8e8dc 100%);
            border-radius: 50%;
            z-index: 3;
            box-shadow:
                inset 0 4px 12px rgba(0, 0, 0, 0.08),
                0 2px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.5s ease;
        }
        /* Ring on cushion */
        .ring-container {
            position: relative;
            z-index: 4;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            opacity: 0;
            transform: scale(0.3) translateY(15px);
            pointer-events: none;
        }
        .ring-container.visible {
            opacity: 1;
            transform: scale(1) translateY(0);
        }
        .ring-emoji {
            font-size: 3.5rem;
            display: block;
            filter: drop-shadow(0 6px 16px rgba(0, 0, 0, 0.3))
                drop-shadow(0 0 25px rgba(255, 220, 150, 0.8))
                drop-shadow(0 0 50px rgba(255, 200, 100, 0.5));
            animation: ringShine 2s ease-in-out infinite;
        }
        @keyframes ringShine {
            0%,
            100% {
                filter: drop-shadow(0 6px 16px rgba(0, 0, 0, 0.3))
                    drop-shadow(0 0 25px rgba(255, 220, 150, 0.8))
                    drop-shadow(0 0 50px rgba(255, 200, 100, 0.5));
            }
            30% {
                filter: drop-shadow(0 6px 16px rgba(0, 0, 0, 0.3))
                    drop-shadow(0 0 35px rgba(255, 240, 180, 1))
                    drop-shadow(0 0 70px rgba(255, 220, 140, 0.8))
                    drop-shadow(0 0 100px rgba(255, 200, 120, 0.4));
            }
            60% {
                filter: drop-shadow(0 6px 16px rgba(0, 0, 0, 0.3))
                    drop-shadow(0 0 20px rgba(255, 200, 130, 0.7))
                    drop-shadow(0 0 45px rgba(255, 190, 100, 0.4));
            }
        }
        @media (max-width: 380px) {
            .ring-emoji {
                font-size: 2.8rem;
            }
        }

        /* Sparkle dots around ring */
        .ring-sparkle {
            position: absolute;
            pointer-events: none;
            font-size: 14px;
            animation: miniSparkle 2s ease-in-out infinite;
        }
        @keyframes miniSparkle {
            0%,
            100% {
                opacity: 0.3;
                transform: scale(0.6);
            }
            50% {
                opacity: 1;
                transform: scale(1.3);
            }
        }

        /* Buttons area */
        .buttons-area {
            display: flex;
            gap: 22px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
        }
        .buttons-area.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        @media (max-width: 380px) {
            .buttons-area {
                gap: 16px;
            }
        }

        .btn-proposal {
            font-size: 1.3rem;
            font-weight: 700;
            padding: 16px 38px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 7px 22px rgba(0, 0, 0, 0.18);
            touch-action: manipulation;
            position: relative;
            overflow: hidden;
            min-width: 110px;
        }
        .btn-yes {
            background: linear-gradient(135deg, #ff8fb3, #ff6b9d, #e85585);
            color: #fff;
            font-size: 1.5rem;
            animation: yesGlow 2s ease-in-out infinite;
        }
        @keyframes yesGlow {
            0%,
            100% {
                box-shadow: 0 7px 22px rgba(255, 107, 157, 0.35);
            }
            50% {
                box-shadow: 0 7px 36px rgba(255, 107, 157, 0.65), 0 0 60px rgba(255, 150, 180, 0.35);
            }
        }
        .btn-yes:hover {
            transform: translateY(-5px) scale(1.07);
            box-shadow: 0 12px 32px rgba(255, 107, 157, 0.55);
        }
        .btn-yes:active {
            transform: scale(0.9);
        }
        .btn-no {
            background: linear-gradient(135deg, #f5e6ea, #f0d8df, #e8c8d2);
            color: #8b5a6b;
            font-size: 1.2rem;
        }
        .btn-no:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 10px 26px rgba(150, 100, 120, 0.3);
        }
        .btn-no:active {
            transform: scale(0.9);
        }

        /* Message area */
        .message-area {
            text-align: center;
            font-weight: 700;
            font-size: 1.1rem;
            padding: 16px 24px;
            border-radius: 30px;
            max-width: 90vw;
            line-height: 1.5;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            opacity: 0;
            transform: scale(0.7);
            pointer-events: none;
        }
        .message-area.visible {
            opacity: 1;
            transform: scale(1);
        }
        .message-celebration {
            background: rgba(255, 255, 255, 0.8);
            color: #c4546a;
            font-size: 1.5rem;
            box-shadow: 0 8px 30px rgba(200, 100, 140, 0.3);
            animation: celebBounce 0.6s ease;
            white-space: pre-line;
        }
        @keyframes celebBounce {
            0% {
                transform: scale(0.3);
                opacity: 0;
            }
            50% {
                transform: scale(1.15);
            }
            70% {
                transform: scale(0.9);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        .message-sorry {
            background: rgba(255, 248, 250, 0.85);
            color: #7a4a5c;
            font-size: 1rem;
            box-shadow: 0 6px 22px rgba(160, 120, 140, 0.2);
            animation: gentleAppear 0.8s ease;
            white-space: pre-line;
        }
        @keyframes gentleAppear {
            0% {
                transform: translateY(30px);
                opacity: 0;
            }
            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Reset button */
        .reset-btn {
            display: none;
            font-size: 0.9rem;
            font-weight: 600;
            color: #7a3b52;
            background: rgba(255, 255, 255, 0.7);
            border: 2px solid #e8c8d2;
            padding: 10px 24px;
            border-radius: 50px;
            cursor: pointer;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 14px rgba(160, 110, 130, 0.18);
            transition: all 0.3s ease;
            touch-action: manipulation;
            animation: btnAppear 0.5s ease;
        }
        .reset-btn.visible {
            display: block;
        }
        @keyframes btnAppear {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 22px rgba(160, 110, 130, 0.3);
        }
        .reset-btn:active {
            transform: scale(0.92);
        }

        /* Celebration overlay */
        .celebration-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 200;
        }
        .confetti-piece-celeb {
            position: absolute;
            pointer-events: none;
            width: 10px;
            height: 10px;
            border-radius: 3px;
            animation: confettiRain 1.8s ease-out forwards;
        }
        @keyframes confettiRain {
            0% {
                transform: translate(0, -80px) rotate(0deg) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--cx), 110vh) rotate(var(--cr)) scale(0.2);
                opacity: 0;
            }
        }
        .heart-burst {
            position: absolute;
            pointer-events: none;
            font-size: 28px;
            animation: heartExplode 1.2s ease-out forwards;
        }
        @keyframes heartExplode {
            0% {
                transform: translate(0, 0) scale(0) rotate(0deg);
                opacity: 1;
            }
            50% {
                transform: translate(var(--hx), var(--hy)) scale(1.8) rotate(180deg);
                opacity: 0.8;
            }
            100% {
                transform: translate(var(--hx2), var(--hy2)) scale(0) rotate(360deg);
                opacity: 0;
            }
        }

        /* Screen shake for celebration */
        .screen-shake {
            animation: screenShake 0.5s ease-out;
        }
        @keyframes screenShake {
            0%,
            100% {
                transform: translateX(0);
            }
            10% {
                transform: translateX(-8px) rotate(-1deg);
            }
            20% {
                transform: translateX(7px) rotate(1deg);
            }
            30% {
                transform: translateX(-5px);
            }
            40% {
                transform: translateX(4px);
            }
            55% {
                transform: translateX(-2px);
            }
            70% {
                transform: translateX(1px);
            }
        }

        /* Hint tap */
        .tap-hint {
            position: absolute;
            bottom: -35px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            color: #c4546a;
            font-weight: 600;
            animation: hintBounce 1.4s ease-in-out infinite;
            pointer-events: none;
            white-space: nowrap;
            z-index: 10;
        }
        @keyframes hintBounce {
            0%,
            100% {
                transform: translateX(-50%) translateY(0);
                opacity: 0.7;
            }
            50% {
                transform: translateX(-50%) translateY(-8px);
                opacity: 1;
            }
        }
        .tap-hint.hidden {
            display: none;
        }
    </style>
</head>
<body>

    <!-- Background decorations -->
    <div class="bg-decorations" id="bgDecorations"></div>

    <!-- Celebration overlay -->
    <div class="celebration-overlay" id="celebrationOverlay"></div>

    <!-- Main -->
    <div class="main-container" id="mainContainer">
        <div class="title-text" id="titleText">💕 Tap the box to open it...</div>

        <div class="box-area" id="boxArea">
            <div class="box-lid" id="boxLid"></div>
            <div class="box-cushion" id="boxCushion">
                <div class="ring-container" id="ringContainer">
                    <span class="ring-emoji">💍</span>
                    <span class="ring-sparkle" style="top:-12px;left:-18px;animation-delay:0s;">✨</span>
                    <span class="ring-sparkle" style="top:-8px;right:-20px;animation-delay:0.7s;">⭐</span>
                    <span class="ring-sparkle" style="bottom:-6px;left:-14px;animation-delay:1.4s;">💫</span>
                    <span class="ring-sparkle" style="bottom:-2px;right:-16px;animation-delay:2.1s;">🌟</span>
                </div>
            </div>
            <div class="box-bottom"></div>
            <div class="tap-hint" id="tapHint">👆 tap me!</div>
        </div>

        <div class="buttons-area" id="buttonsArea">
            <button class="btn-proposal btn-yes" id="btnYes">Yes 💖</button>
            <button class="btn-proposal btn-no" id="btnNo">No 💔</button>
        </div>

        <div class="message-area" id="messageArea"></div>

        <button class="reset-btn" id="resetBtn">🔄 Ask Again?</button>
    </div>

    <script>
        (function() {
            // ────────────────────────────
            // DOM refs
            // ────────────────────────────
            const boxLid = document.getElementById('boxLid');
            const boxArea = document.getElementById('boxArea');
            const ringContainer = document.getElementById('ringContainer');
            const buttonsArea = document.getElementById('buttonsArea');
            const messageArea = document.getElementById('messageArea');
            const titleText = document.getElementById('titleText');
            const tapHint = document.getElementById('tapHint');
            const resetBtn = document.getElementById('resetBtn');
            const mainContainer = document.getElementById('mainContainer');
            const celebrationOverlay = document.getElementById('celebrationOverlay');
            const bgDecorations = document.getElementById('bgDecorations');
            const btnYes = document.getElementById('btnYes');
            const btnNo = document.getElementById('btnNo');

            let boxOpened = false;
            let answered = false;
            let isAnimating = false;

            // ────────────────────────────
            // Create floating background elements
            // ────────────────────────────
            function createBgDecorations() {
                const items = ['💕', '💖', '💗', '💝', '💘', '🩷', '💓', '🌸', '✨', '💐', '🩵', '💎', '🌟', '💫'];
                for (let i = 0; i < 25; i++) {
                    const el = document.createElement('span');
                    el.className = 'floating-element';
                    el.textContent = items[Math.floor(Math.random() * items.length)];
                    el.style.left = Math.random() * 94 + '%';
                    el.style.fontSize = (14 + Math.random() * 26) + 'px';
                    el.style.animationDuration = (9 + Math.random() * 18) + 's';
                    el.style.animationDelay = Math.random() * 14 + 's';
                    el.style.opacity = (0.22 + Math.random() * 0.38);
                    bgDecorations.appendChild(el);
                }
            }

            // ────────────────────────────
            // Open box
            // ────────────────────────────
            boxArea.addEventListener('click', function(e) {
                if (isAnimating) return;
                if (answered) return;
                if (!boxOpened) {
                    openBox();
                }
            });

            function openBox() {
                isAnimating = true;
                boxOpened = true;

                // Open lid
                boxLid.classList.add('open');
                tapHint.classList.add('hidden');

                // Show ring after a short delay
                setTimeout(function() {
                    ringContainer.classList.add('visible');
                }, 350);

                // Show buttons
                setTimeout(function() {
                    buttonsArea.classList.add('visible');
                    titleText.textContent = '💍 Will you marry me?';
                    titleText.classList.add('opened');
                }, 600);

                // Spawn sparkles
                setTimeout(function() {
                    const rect = boxArea.getBoundingClientRect();
                    const cx = rect.left + rect.width / 2;
                    const cy = rect.top + rect.height * 0.35;
                    spawnBoxSparkles(cx, cy, 15);
                }, 400);

                setTimeout(function() {
                    isAnimating = false;
                }, 700);
            }

            // ────────────────────────────
            // Yes button
            // ────────────────────────────
            btnYes.addEventListener('click', function(e) {
                e.stopPropagation();
                if (answered || isAnimating) return;
                answered = true;
                isAnimating = true;

                // Hide buttons
                buttonsArea.classList.remove('visible');

                // Show celebration message
                setTimeout(function() {
                    messageArea.textContent = '🎉 Yaaaaaaaayy!!! 🎉\nI am the happiest person ever! 💖';
                    messageArea.className = 'message-area message-celebration visible';
                }, 300);

                // Screen shake
                setTimeout(function() {
                    mainContainer.classList.add('screen-shake');
                    setTimeout(function() { mainContainer.classList.remove('screen-shake'); }, 500);
                }, 400);

                // Massive celebration
                const rect = boxArea.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                spawnConfettiRain(cx, cy, 60);
                spawnHeartBursts(cx, cy, 25);
                spawnBoxSparkles(cx, cy, 30);

                // Update title
                titleText.textContent = '💖 She said YES! 💖';
                titleText.classList.add('opened');

                // Show reset
                setTimeout(function() {
                    resetBtn.classList.add('visible');
                    isAnimating = false;
                }, 800);
            });

            // ────────────────────────────
            // No button
            // ────────────────────────────
            btnNo.addEventListener('click', function(e) {
                e.stopPropagation();
                if (answered || isAnimating) return;
                answered = true;
                isAnimating = true;

                // Hide buttons
                buttonsArea.classList.remove('visible');

                // Show gentle sorry message
                setTimeout(function() {
                    messageArea.textContent =
                        '😢 Ohhh... I am sorry...\nI will try my best to be a good match for you... 💔';
                    messageArea.className = 'message-area message-sorry visible';
                }, 300);

                // Gentle sparkles (subdued)
                const rect = boxArea.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                spawnBoxSparkles(cx, cy, 10);

                // Update title
                titleText.textContent = '💔 Maybe someday...';
                titleText.classList.add('opened');

                // Show reset
                setTimeout(function() {
                    resetBtn.classList.add('visible');
                    isAnimating = false;
                }, 800);
            });

            // ────────────────────────────
            // Reset
            // ────────────────────────────
            resetBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                resetAll();
            });

            function resetAll() {
                boxOpened = false;
                answered = false;
                isAnimating = false;

                boxLid.classList.remove('open');
                ringContainer.classList.remove('visible');
                buttonsArea.classList.remove('visible');
                messageArea.className = 'message-area';
                messageArea.textContent = '';
                resetBtn.classList.remove('visible');
                tapHint.classList.remove('hidden');
                titleText.textContent = '💕 Tap the box to open it...';
                titleText.classList.remove('opened');
                mainContainer.classList.remove('screen-shake');

                // Clear celebration overlay
                celebrationOverlay.innerHTML = '';
            }

            // ────────────────────────────
            // Particles
            // ────────────────────────────
            function spawnBoxSparkles(x, y, count) {
                const emojis = ['✨', '⭐', '💫', '🌟', '💖', '💕', '💎', '🔮', '💝', '🩷'];
                for (let i = 0; i < count; i++) {
                    const s = document.createElement('span');
                    s.className = 'heart-burst';
                    s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    s.style.left = x + 'px';
                    s.style.top = y + 'px';
                    s.style.fontSize = (16 + Math.random() * 30) + 'px';
                    s.style.setProperty('--hx', (Math.random() - 0.5) * 200 + 'px');
                    s.style.setProperty('--hy', (Math.random() - 0.7) * 180 + 'px');
                    s.style.setProperty('--hx2', (Math.random() - 0.5) * 280 + 'px');
                    s.style.setProperty('--hy2', (Math.random() - 0.8) * 240 + 'px');
                    s.style.animationDuration = (0.8 + Math.random() * 1.4) + 's';
                    celebrationOverlay.appendChild(s);
                    setTimeout(function() { s.remove(); }, 1500);
                }
            }

            function spawnConfettiRain(x, y, count) {
                const colors = [
                    '#ff6b9d', '#ff9ec4', '#ffd4e3', '#f0d890', '#e891b4',
                    '#ffb3c6', '#ffc2d1', '#ffe5ec', '#d4a853', '#ff8fab',
                    '#c49a3c', '#e8c878', '#ffe0ec', '#ffd0e2', '#ffb8d0',
                    '#fddde6', '#fccfdc', '#fbb1c8', '#f998b9', '#ff7ba6'
                ];
                for (let i = 0; i < count; i++) {
                    const c = document.createElement('div');
                    c.className = 'confetti-piece-celeb';
                    c.style.background = colors[Math.floor(Math.random() * colors.length)];
                    c.style.left = (x + (Math.random() - 0.5) * 300) + 'px';
                    c.style.top = y + 'px';
                    c.style.width = (7 + Math.random() * 16) + 'px';
                    c.style.height = (6 + Math.random() * 14) + 'px';
                    c.style.setProperty('--cx', (Math.random() - 0.5) * 500 + 'px');
                    c.style.setProperty('--cr', (Math.random() * 900 - 450) + 'deg');
                    c.style.animationDuration = (1.2 + Math.random() * 2.5) + 's';
                    c.style.animationDelay = Math.random() * 0.8 + 's';
                    c.style.borderRadius = Math.random() > 0.5 ? '50%' : '3px';
                    celebrationOverlay.appendChild(c);
                    setTimeout(function() { c.remove(); }, 3000);
                }
            }

            function spawnHeartBursts(x, y, count) {
                const hearts = ['💖', '💕', '💗', '💝', '💘', '💓', '🩷', '❤️', '💞', '💟'];
                for (let i = 0; i < count; i++) {
                    const h = document.createElement('span');
                    h.className = 'heart-burst';
                    h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                    h.style.left = x + 'px';
                    h.style.top = y + 'px';
                    h.style.fontSize = (20 + Math.random() * 40) + 'px';
                    h.style.setProperty('--hx', (Math.random() - 0.5) * 350 + 'px');
                    h.style.setProperty('--hy', (Math.random() - 0.8) * 300 + 'px');
                    h.style.setProperty('--hx2', (Math.random() - 0.5) * 400 + 'px');
                    h.style.setProperty('--hy2', (Math.random() - 0.9) * 380 + 'px');
                    h.style.animationDuration = (1 + Math.random() * 2) + 's';
                    h.style.animationDelay = Math.random() * 0.4 + 's';
                    celebrationOverlay.appendChild(h);
                    setTimeout(function() { h.remove(); }, 2500);
                }
            }

            // ────────────────────────────
            // Init
            // ────────────────────────────
            function init() {
                createBgDecorations();
                ringContainer.classList.remove('visible');
                buttonsArea.classList.remove('visible');
                messageArea.className = 'message-area';
                messageArea.textContent = '';
                resetBtn.classList.remove('visible');
                boxLid.classList.remove('open');
                tapHint.classList.remove('hidden');
                titleText.textContent = '💕 Tap the box to open it...';
                titleText.classList.remove('opened');
            }

            init();

            console.log('💍 Ring box ready! Tap the velvet box to open it.');
            console.log('💖 The ring is hidden under the lid until you tap!');
            console.log('💍 Will you say yes?');
        })();
    </script>
</body>
</html>
