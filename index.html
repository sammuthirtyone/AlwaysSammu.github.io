<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Gallery</title>
    <style>
        :root {
            --bg: #0f0f1a;
            --card-bg: rgba(255, 255, 255, 0.04);
            --text: #e0e0e0;
            --accent: #a78bfa;
            --accent-hover: #c4b5fd;
            --danger: #f87171;
            --glass: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.1);
            --radius: 16px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Subtle animated background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(167, 139, 250, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 60%, rgba(139, 167, 250, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(250, 139, 167, 0.05) 0%, transparent 50%);
            animation: bgFloat 20s ease-in-out infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes bgFloat {
            0%,
            100% {
                transform: translate(0, 0) rotate(0deg);
            }
            33% {
                transform: translate(2%, -1%) rotate(1deg);
            }
            66% {
                transform: translate(-1%, 2%) rotate(-1deg);
            }
        }

        /* ========== LOGIN OVERLAY ========== */
        .login-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            background: rgba(15, 15, 26, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .login-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .login-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 48px 36px;
            width: 90%;
            max-width: 420px;
            box-shadow: var(--shadow);
            text-align: center;
            position: relative;
            z-index: 1;
            animation: cardEntry 0.6s ease-out;
        }

        @keyframes cardEntry {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .lock-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 20px;
            background: rgba(167, 139, 250, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(167, 139, 250, 0.4);
            }
            50% {
                box-shadow: 0 0 0 20px rgba(167, 139, 250, 0);
            }
        }

        .login-card h2 {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 6px;
            letter-spacing: -0.02em;
            color: #fff;
        }

        .login-card .subtitle {
            font-size: 0.9rem;
            color: #9ca3af;
            margin-bottom: 28px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 48px 14px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            letter-spacing: 0.04em;
            transition: var(--transition);
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.15);
            background: rgba(255, 255, 255, 0.07);
        }

        .input-group input::placeholder {
            color: #6b7280;
            letter-spacing: 0.02em;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 6px;
            transition: color 0.2s;
            z-index: 2;
        }
        .toggle-password:hover {
            color: #e0e0e0;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #0f0f1a;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            letter-spacing: 0.02em;
        }
        .login-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(167, 139, 250, 0.3);
        }
        .login-btn:active {
            transform: scale(0.97);
        }

        .error-msg {
            color: var(--danger);
            font-size: 0.85rem;
            margin-top: 10px;
            min-height: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .error-msg.show {
            opacity: 1;
        }

        /* Shake animation */
        .shake {
            animation: shake 0.5s ease-in-out;
        }
        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            10%,
            50%,
            90% {
                transform: translateX(-6px);
            }
            30%,
            70% {
                transform: translateX(6px);
            }
        }

        /* ========== MAIN GALLERY CONTENT ========== */
        .main-content {
            position: relative;
            z-index: 1;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
            pointer-events: none;
            padding: 20px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .main-content.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }

        .gallery-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 8px 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .gallery-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #c4b5fd, #a78bfa, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logout-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            color: #e0e0e0;
            cursor: pointer;
            font-size: 0.9rem;
            transition: var(--transition);
            white-space: nowrap;
        }
        .logout-btn:hover {
            background: rgba(248, 113, 113, 0.15);
            border-color: rgba(248, 113, 113, 0.4);
            color: #f87171;
        }

        /* Gallery Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 18px;
            padding-bottom: 40px;
        }

        .gallery-item {
            position: relative;
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            aspect-ratio: 4 / 3;
            background: rgba(255, 255, 255, 0.03);
            transition: var(--transition);
            group: true;
        }

        .gallery-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
            display: block;
        }

        .gallery-item:hover img {
            transform: scale(1.06);
        }

        .gallery-item .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.7) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: flex-end;
            padding: 16px;
        }

        .gallery-item:hover .overlay {
            opacity: 1;
        }

        .gallery-item .overlay span {
            color: #fff;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        .gallery-item .image-number {
            position: absolute;
            top: 10px;
            left: 12px;
            background: rgba(0, 0, 0, 0.55);
            color: #fff;
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 500;
            letter-spacing: 0.03em;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 2;
        }

        /* ========== LIGHTBOX ========== */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            cursor: pointer;
        }

        .lightbox.active {
            opacity: 1;
            visibility: visible;
        }

        .lightbox-image-container {
            position: relative;
            max-width: 90vw;
            max-height: 85vh;
            cursor: default;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lightbox img {
            max-width: 90vw;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            animation: zoomIn 0.35s ease-out;
        }

        @keyframes zoomIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 28px;
            font-size: 2.5rem;
            color: #fff;
            cursor: pointer;
            z-index: 2001;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            border: none;
            transition: var(--transition);
            line-height: 1;
        }
        .lightbox-close:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(90deg);
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 2rem;
            color: #fff;
            cursor: pointer;
            z-index: 2001;
            width: 54px;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            border: none;
            transition: var(--transition);
            user-select: none;
        }
        .lightbox-nav:hover {
            background: rgba(255, 255, 255, 0.22);
        }
        .lightbox-nav.prev {
            left: 20px;
        }
        .lightbox-nav.next {
            right: 20px;
        }

        .lightbox-counter {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            background: rgba(0, 0, 0, 0.5);
            padding: 6px 16px;
            border-radius: 20px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .login-card {
                padding: 32px 22px;
                border-radius: 16px;
            }
            .login-card h2 {
                font-size: 1.4rem;
            }
            .lock-icon {
                width: 50px;
                height: 50px;
                font-size: 24px;
            }
            .gallery-header h1 {
                font-size: 1.4rem;
            }
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 10px;
            }
            .lightbox-nav {
                width: 40px;
                height: 40px;
                font-size: 1.4rem;
            }
            .lightbox-nav.prev {
                left: 8px;
            }
            .lightbox-nav.next {
                right: 8px;
            }
            .lightbox-close {
                top: 10px;
                right: 10px;
                font-size: 1.8rem;
                width: 38px;
                height: 38px;
            }
        }

        @media (max-width: 400px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
            .gallery-item {
                aspect-ratio: 1 / 1;
            }
        }
    </style>
</head>
<body>

    <!-- ==================== LOGIN OVERLAY ==================== -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-card" id="loginCard">
            <div class="lock-icon">🔒</div>
            <h2>Protected Gallery</h2>
            <p class="subtitle">Enter the password to access the collection</p>
            <div class="input-group">
                <input
                type="password"
                id="passwordInput"
                placeholder="••••••••••"
                autocomplete="off"
                spellcheck="false"
                >
                <button class="toggle-password" id="togglePasswordBtn" type="button" title="Show password">👁️</button>
            </div>
            <button class="login-btn" id="loginBtn">Unlock Gallery</button>
            <p class="error-msg" id="errorMsg"></p>
        </div>
    </div>

    <!-- ==================== MAIN GALLERY CONTENT ==================== -->
    <div class="main-content" id="mainContent">
        <header class="gallery-header">
            <h1>📸 My Photo Collection</h1>
            <button class="logout-btn" id="logoutBtn">
                <span>🚪</span> Lock & Leave
            </button>
        </header>
        <div class="gallery-grid" id="galleryGrid">
            <!-- Gallery items injected by JS -->
        </div>
    </div>

    <!-- ==================== LIGHTBOX ==================== -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightboxClose" title="Close (Esc)">✕</button>
        <button class="lightbox-nav prev" id="lightboxPrev" title="Previous (←)">◂</button>
        <button class="lightbox-nav next" id="lightboxNext" title="Next (→)">▸</button>
        <div class="lightbox-image-container">
            <img src="" alt="Gallery Image" id="lightboxImg">
        </div>
        <div class="lightbox-counter" id="lightboxCounter"></div>
    </div>

    <script>
        (function() {
            // ──────────────────────────────────────
            // PASSWORD PROTECTION (XOR-obfuscated)
            // The actual password is NEVER stored in plain text.
            // Encoded by XOR'ing each char code with 7.
            // ──────────────────────────────────────
            const ENCODED_PASSWORD = [119, 117, 102, 47, 116, 102, 106, 46, 53, 49];
            const XOR_KEY = 7;

            /**
             * Decodes the obfuscated password at runtime.
             * @returns {string} The original password.
             */
            function decodePassword() {
                return ENCODED_PASSWORD.map(code => String.fromCharCode(code ^ XOR_KEY)).join('');
            }

            /**
             * Verifies user input against the stored password.
             * Uses constant-time-ish comparison to mitigate timing attacks.
             * @param {string} input - The user's typed password.
             * @returns {boolean}
             */
            function verifyPassword(input) {
                const realPassword = decodePassword();
                const trimmed = input.trim();
                // Constant-length comparison
                if (trimmed.length !== realPassword.length) return false;
                let match = true;
                for (let i = 0; i < realPassword.length; i++) {
                    if (trimmed[i] !== realPassword[i]) match = false;
                }
                return match;
            }

            // ──────────────────────────────────────
            // GALLERY DATA
            // Replace these URLs with your own image paths
            // for GitHub Pages, e.g.: "images/photo1.jpg"
            // ──────────────────────────────────────
            const galleryImages = [{
                src: 'https://picsum.photos/seed/mountain/800/600',
               
            }, {
                src: 'https://picsum.photos/seed/lake/800/600',
            
            }, {
                src: 'https://picsum.photos/seed/forest/800/600',
                
            }, {
                src: 'https://picsum.photos/seed/ocean/800/600',
          
            }, {
                src: 'https://picsum.photos/seed/sunset/800/600',
              
            }, {
                src: 'https://picsum.photos/seed/city/800/600',
               
            }, {
                src: 'https://picsum.photos/seed/garden/800/600',
                
            }, {
                src: 'https://picsum.photos/seed/river/800/600',
                
            }, {
                src: 'https://picsum.photos/seed/desert/800/600',
               
            }, {
                src: 'https://picsum.photos/seed/snow/800/600',
           
            }, {
                src: 'https://picsum.photos/seed/bridge/800/600',
               
            }, {
                src: 'https://picsum.photos/seed/flower/800/600',
           
            }, ];

            // ──────────────────────────────────────
            // DOM ELEMENTS
            // ──────────────────────────────────────
            const loginOverlay = document.getElementById('loginOverlay');
            const loginCard = document.getElementById('loginCard');
            const passwordInput = document.getElementById('passwordInput');
            const togglePasswordBtn = document.getElementById('togglePasswordBtn');
            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            const mainContent = document.getElementById('mainContent');
            const galleryGrid = document.getElementById('galleryGrid');
            const logoutBtn = document.getElementById('logoutBtn');
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightboxImg');
            const lightboxClose = document.getElementById('lightboxClose');
            const lightboxPrev = document.getElementById('lightboxPrev');
            const lightboxNext = document.getElementById('lightboxNext');
            const lightboxCounter = document.getElementById('lightboxCounter');

            let currentLightboxIndex = 0;
            let isLoggedIn = false;

            // ──────────────────────────────────────
            // SESSION MANAGEMENT
            // ──────────────────────────────────────
            const SESSION_KEY = '_gallery_auth_session';

            function checkSession() {
                const session = sessionStorage.getItem(SESSION_KEY);
                if (session === 'authenticated') {
                    revealGallery(false);
                }
            }

            function setSession() {
                sessionStorage.setItem(SESSION_KEY, 'authenticated');
            }

            function clearSession() {
                sessionStorage.removeItem(SESSION_KEY);
            }

            // ──────────────────────────────────────
            // LOGIN / LOGOUT LOGIC
            // ──────────────────────────────────────
            function revealGallery(animate = true) {
                isLoggedIn = true;
                setSession();
                loginOverlay.classList.add('hidden');
                mainContent.classList.add('visible');
                if (!animate) {
                    mainContent.style.transition = 'none';
                    requestAnimationFrame(() => {
                        mainContent.style.transition = '';
                    });
                }
                // Build gallery if not already built
                if (galleryGrid.children.length === 0) {
                    buildGallery();
                }
                passwordInput.value = '';
                errorMsg.classList.remove('show');
            }

            function lockGallery() {
                isLoggedIn = false;
                clearSession();
                loginOverlay.classList.remove('hidden');
                mainContent.classList.remove('visible');
                passwordInput.value = '';
                errorMsg.classList.remove('show');
                closeLightbox();
                // Scroll to top
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            function handleLogin() {
                const input = passwordInput.value;
                if (verifyPassword(input)) {
                    errorMsg.classList.remove('show');
                    revealGallery(true);
                } else {
                    // Show error + shake
                    errorMsg.textContent = '❌ Incorrect password. Please try again.';
                    errorMsg.classList.add('show');
                    loginCard.classList.add('shake');
                    passwordInput.focus();
                    passwordInput.select();
                    setTimeout(() => {
                        loginCard.classList.remove('shake');
                    }, 500);
                }
            }

            // ──────────────────────────────────────
            // BUILD GALLERY
            // ──────────────────────────────────────
            function buildGallery() {
                galleryGrid.innerHTML = '';
                galleryImages.forEach((imgData, index) => {
                    const item = document.createElement('div');
                    item.className = 'gallery-item';
                    item.setAttribute('data-index', index);
                    item.innerHTML = `
                            <span class="image-number">#${index + 1}</span>
                            <img
                                src="${imgData.src}"
                                alt="${imgData.title}"
                                loading="lazy"
                            >
                            <div class="overlay">
                                <span>${imgData.title}</span>
                            </div>
                        `;
                    item.addEventListener('click', () => openLightbox(index));
                    galleryGrid.appendChild(item);
                });
            }

            // ──────────────────────────────────────
            // LIGHTBOX LOGIC
            // ──────────────────────────────────────
            function openLightbox(index) {
                if (!isLoggedIn) return;
                currentLightboxIndex = index;
                updateLightboxImage();
                lightbox.classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            function closeLightbox() {
                lightbox.classList.remove('active');
                document.body.style.overflow = '';
                lightboxImg.src = '';
            }

            function updateLightboxImage() {
                const imgData = galleryImages[currentLightboxIndex];
                lightboxImg.src = imgData.src;
                lightboxImg.alt = imgData.title;
                lightboxCounter.textContent =
                    `${currentLightboxIndex + 1} / ${galleryImages.length}  —  ${imgData.title}`;
                // Add a subtle re-animation
                lightboxImg.style.animation = 'none';
                lightboxImg.offsetHeight; // trigger reflow
                lightboxImg.style.animation = 'zoomIn 0.35s ease-out';
            }

            function navigateLightbox(direction) {
                if (!isLoggedIn) return;
                currentLightboxIndex += direction;
                if (currentLightboxIndex < 0) {
                    currentLightboxIndex = galleryImages.length - 1;
                } else if (currentLightboxIndex >= galleryImages.length) {
                    currentLightboxIndex = 0;
                }
                updateLightboxImage();
            }

            // ──────────────────────────────────────
            // EVENT LISTENERS
            // ──────────────────────────────────────
            loginBtn.addEventListener('click', handleLogin);

            passwordInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleLogin();
                }
            });

            togglePasswordBtn.addEventListener('click', () => {
                const isPassword = passwordInput.type === 'password';
                passwordInput.type = isPassword ? 'text' : 'password';
                togglePasswordBtn.textContent = isPassword ? '🙈' : '👁️';
                togglePasswordBtn.title = isPassword ? 'Hide password' : 'Show password';
                passwordInput.focus();
            });

            logoutBtn.addEventListener('click', () => {
                // Confirmation dialog
                if (confirm('Are you sure you want to lock the gallery? You will need the password to re-enter.')) {
                    lockGallery();
                }
            });

            // Lightbox events
            lightboxClose.addEventListener('click', (e) => {
                e.stopPropagation();
                closeLightbox();
            });

            lightbox.addEventListener('click', (e) => {
                // Close if clicking the dark background (not the image or buttons)
                if (e.target === lightbox) {
                    closeLightbox();
                }
            });

            lightboxPrev.addEventListener('click', (e) => {
                e.stopPropagation();
                navigateLightbox(-1);
            });

            lightboxNext.addEventListener('click', (e) => {
                e.stopPropagation();
                navigateLightbox(1);
            });

            // Keyboard navigation
            document.addEventListener('keydown', (e) => {
                if (!lightbox.classList.contains('active')) {
                    // If lightbox is closed but user is on the login screen, focus the input
                    if (!isLoggedIn && e.key === 'Escape') {
                        passwordInput.focus();
                    }
                    return;
                }
                switch (e.key) {
                    case 'Escape':
                        closeLightbox();
                        break;
                    case 'ArrowLeft':
                        navigateLightbox(-1);
                        break;
                    case 'ArrowRight':
                        navigateLightbox(1);
                        break;
                    default:
                        break;
                }
            });

            // Touch swipe support for lightbox on mobile
            let touchStartX = 0;
            let touchEndX = 0;
            lightbox.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });

            lightbox.addEventListener('touchend', (e) => {
                touchEndX = e.changedTouches[0].screenX;
                const diff = touchStartX - touchEndX;
                const threshold = 60;
                if (Math.abs(diff) > threshold) {
                    if (diff > 0) {
                        // Swiped left → next
                        navigateLightbox(1);
                    } else {
                        // Swiped right → prev
                        navigateLightbox(-1);
                    }
                }
            });

            // ──────────────────────────────────────
            // INITIALIZATION
            // ──────────────────────────────────────
            function init() {
                // Check if there's an existing session
                const hasSession = sessionStorage.getItem(SESSION_KEY) === 'authenticated';
                if (hasSession) {
                    revealGallery(false);
                } else {
                    // Ensure login is visible
                    loginOverlay.classList.remove('hidden');
                    mainContent.classList.remove('visible');
                    // Auto-focus password input
                    setTimeout(() => {
                        passwordInput.focus();
                    }, 400);
                }
            }

            init();

            // ──────────────────────────────────────
            // SECURITY NOTE:
            // This is client-side protection only.
            // For truly sensitive content, use
            // server-side authentication.
            // The password is XOR-obfuscated in the
            // source code — not plain text, but
            // not cryptographically secure either.
            // Suitable for casual privacy on
            // static site hosts like GitHub Pages.
            // ──────────────────────────────────────
        })();
    </script>
